# Config de ejemplo para Alex — copiar a ~/.claude/multipc-config.yaml
# Editar rutas segun tu PC

repos:
  # Vault compartido de REC (submodulo o repo independiente)
  - name: "rec-vault"
    path: "~/rec-vault"            # Ajustar a tu ruta

  # Config de Claude Code (si usas)
  - name: "claude-config"
    path: "~/.claude"
    preserve_local:
      - "mcp.json"
      - ".mcp.json"

  # Otros repos que quieras sincronizar
  # - name: "mi-proyecto"
  #   path: "~/mi-proyecto"

checks:
  - name: "Git"
    command: "git --version"
